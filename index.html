<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Clario</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    .screen {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <h1>Clario App 🚀</h1>

  <div id="root"></div>

  <script>
    function HomeScreen() {
      return "<div class='screen'>🏠 Home Screen</div>";
    }

    function ScanScreen() {
      return "<div class='screen'>📷 Scan Screen</div>";
    }

    function ResultScreen() {
      return "<div class='screen'>📊 Result Screen</div>";
    }

    function ChatScreen() {
      return "<div class='screen'>💬 Chat Screen</div>";
    }

    document.getElementById("root").innerHTML =
      HomeScreen() +
      ScanScreen() +
      ResultScreen() +
      ChatScreen();
  </script>

</body>
</html>
